<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel Admin — PRISMA</title>
<script src="shared.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
  <a href="index.html" class="logo">
    <svg width="22" height="26" viewBox="0 0 26 31" fill="none">
      <polygon points="13,2 1,27 25,27" fill="#3D7A5F" opacity="0.92"/>
      <polygon points="1,27 13,31 13,2" fill="#2d6a4f" opacity="0.75"/>
      <polygon points="25,27 13,31 13,2" fill="#7A3D6E" opacity="0.82"/>
      <polygon points="13,2 8,10 13,7 18,10" fill="white" opacity="0.2"/>
    </svg>
    <div class="logo-text"><span class="logo-name">PRISMA</span><span class="logo-sub">Soluções Corporativas</span></div>
  </a>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="tag tag-purple">Admin</span>
    <button onclick="sairApp()" style="background:transparent;border:1.5px solid var(--border);color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;">Sair</button>
  </div>
</div>

<!-- LISTA EMPRESAS -->
<div id="v-emps" style="padding:0 20px 40px;">
  <div style="padding:16px 0 20px;">
    <p style="font-size:0.75rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--purple);margin-bottom:6px;">Painel PRISMA</p>
    <h1>Empresas-Clientes</h1>
  </div>
  <div id="emps-lista" style="display:flex;flex-direction:column;gap:12px;"></div>
</div>

<!-- EMPRESA -->
<div id="v-emp" style="display:none;padding:0 20px 40px;">
  <div style="display:flex;align-items:center;gap:12px;padding:16px 0 20px;flex-wrap:wrap;">
    <button class="btn btn-ghost btn-sm" onclick="voltarEmps()">← Empresas</button>
    <div>
      <p style="font-size:0.75rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--purple);margin-bottom:4px;" id="emp-lbl"></p>
      <h1 id="emp-titulo" style="font-size:1.4rem;"></h1>
    </div>
  </div>

  <div class="tabs" id="tabs-row">
    <button class="tab active" onclick="setTab('visao')">📊 Visão Geral</button>
    <button class="tab" onclick="setTab('ocs')">📝 Ocorrências</button>
    <button class="tab" onclick="setTab('ses')">🫂 Sessões</button>
    <button class="tab" onclick="setTab('sims')">🎭 Simulações</button>
    <button class="tab" onclick="setTab('rels')">📋 Relatórios</button>
  </div>

  <div class="tab-content active" id="tab-visao">
    <div class="stats-grid" id="stats-g"></div>
    <div class="card" style="margin-bottom:16px;">
      <h3 style="margin-bottom:4px;">Tipos de problema mais frequentes</h3>
      <p style="font-size:0.75rem;margin-bottom:16px;">Ocorrências + simulações combinadas</p>
      <div id="graf"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="card"><h3 style="margin-bottom:12px;">Por Setor</h3><div id="brk-s"></div></div>
      <div class="card"><h3 style="margin-bottom:12px;">Por Cargo</h3><div id="brk-c"></div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-ocs"><div id="ocs-l"></div></div>
  <div class="tab-content" id="tab-ses"><div id="ses-l"></div></div>
  <div class="tab-content" id="tab-sims"><div id="sims-l"></div></div>
  <div class="tab-content" id="tab-rels">
    <div style="margin-bottom:16px;"><button class="btn btn-purple" onclick="gerarRel()" style="width:auto;padding:12px 20px;">📋 Gerar Relatório do Mês</button></div>
    <div id="rels-l"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeM()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const session=PRISMA.getSession();
if(!session||session.role!=='admin') location.href='login.html';
let emp=null;

function carregarEmps(){
  document.getElementById('emps-lista').innerHTML=PRISMA.empresas.map(e=>{
    const oc=PRISMA.getOcorrencias(e).length, se=PRISMA.getSessoes(e).length, si=PRISMA.getSimulacoes(e).length;
    return `<div class="card-row" onclick="abrirEmp('${e}')">
      <div class="card-icon icon-purple">🏢</div>
      <div class="card-row-text">
        <h3>${e}</h3>
        <p>${oc} ocorrência${oc!==1?'s':''} · ${se} sessão${se!==1?'ões':''} · ${si} simulação${si!==1?'ões':''}</p>
      </div>
      <div class="card-row-arrow">›</div>
    </div>`;
  }).join('');
}

function abrirEmp(e){
  emp=e;
  document.getElementById('v-emps').style.display='none';
  document.getElementById('v-emp').style.display='';
  document.getElementById('emp-titulo').textContent=e;
  document.getElementById('emp-lbl').textContent=e;
  setTab('visao');
}

function voltarEmps(){ emp=null; document.getElementById('v-emps').style.display=''; document.getElementById('v-emp').style.display='none'; carregarEmps(); }

function setTab(t){
  const tabs=['visao','ocs','ses','sims','rels'];
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',tabs[i]===t));
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='visao') loadVisao();
  else if(t==='ocs') loadOcs();
  else if(t==='ses') loadSes();
  else if(t==='sims') loadSims();
  else if(t==='rels') loadRels();
}

function loadVisao(){
  const oc=PRISMA.getOcorrencias(emp), se=PRISMA.getSessoes(emp), si=PRISMA.getSimulacoes(emp);
  const avg=Math.round(si.reduce((a,s)=>a+s.score,0)/(si.length||1));
  document.getElementById('stats-g').innerHTML=`
    <div class="stat-card"><div class="stat-val">${oc.length}</div><div class="stat-lbl">Ocorrências</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green);">${se.length}</div><div class="stat-lbl">Sessões</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--blue);">${si.length}</div><div class="stat-lbl">Simulações</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${avg>=70?'var(--green)':avg>=40?'#e67e22':'var(--red)'};">${avg}</div><div class="stat-lbl">Score médio</div></div>`;

  const cont={};
  oc.forEach(o=>{if(o.tipo)cont[o.tipo]=(cont[o.tipo]||0)+1;});
  si.forEach(s=>s.erros?.forEach(e=>{cont[e.tipo]=(cont[e.tipo]||0)+1;}));
  const sorted=Object.entries(cont).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?.[1]||1;
  const cores={'Microagressão':'#e67e22','Viés Inconsciente':'#9b59b6','Sobrecarga':'#e74c3c','Linguagem Discriminatória':'#c0392b','Assédio moral':'#8e44ad','Assédio sexual':'#c0392b','Burnout':'#e67e22','Discriminação':'#2980b9'};
  document.getElementById('graf').innerHTML=!sorted.length?'<p style="text-align:center;color:var(--muted);padding:20px;">Nenhum dado disponível.</p>':
    sorted.map(([tp,q])=>`<div class="barra-wrap"><div class="barra-lbl"><span>${tp}</span><span style="font-weight:700;">${q}</span></div><div class="barra" style="width:${Math.max(8,(q/max)*100)}%;background:${cores[tp]||'var(--purple)'};">${q}</div></div>`).join('');

  const setores={}, cargos={};
  si.forEach(s=>{setores[s.setor]=(setores[s.setor]||0)+1; cargos[s.cargo]=(cargos[s.cargo]||0)+1;});
  oc.forEach(o=>{if(o.setor)setores[o.setor]=(setores[o.setor]||0)+1;});

  const mkB=(obj,id)=>{document.getElementById(id).innerHTML=!Object.keys(obj).length?'<p style="font-size:0.8rem;color:var(--muted);">Sem dados.</p>':
    Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(([k,n])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg);"><span style="font-size:0.83rem;">${k}</span><span class="tag tag-purple">${n}</span></div>`).join('');};
  mkB(setores,'brk-s'); mkB(cargos,'brk-c');
}

function loadOcs(){
  const oc=PRISMA.getOcorrencias(emp);
  document.getElementById('ocs-l').innerHTML=!oc.length?empty():
    oc.map(o=>`<div class="list-item">
      <div class="card-icon ${o.anonimo?'icon-purple':'icon-green'}" style="width:40px;height:40px;font-size:1rem;flex-shrink:0;">${o.anonimo?'🔒':'👤'}</div>
      <div style="flex:1;"><h4>${o.tipo||'Ocorrência'}</h4><p>${new Date(o.data).toLocaleDateString('pt-BR')} · ${o.frequencia||'—'} · ${o.setor||'Setor não informado'}</p>
      <div style="margin-top:4px;"><span class="tag ${o.anonimo?'tag-gray':'tag-green'}">${o.anonimo?'Anônimo':'Identificado'}</span></div></div>
      <button class="btn btn-purple btn-sm" onclick="verOc(${o.id})">Analisar →</button>
    </div>`).join('');
}

function loadSes(){
  const se=PRISMA.getSessoes(emp);
  document.getElementById('ses-l').innerHTML=!se.length?empty():
    se.map(s=>`<div class="list-item">
      <div class="card-icon ${s.status==='finalizada'?'icon-purple':'icon-green'}" style="width:40px;height:40px;font-size:1rem;flex-shrink:0;">${s.status==='finalizada'?'🔒':'💬'}</div>
      <div style="flex:1;"><h4>${s.horario||'Sessão'} — ${s.formato==='video'?'Vídeo':'Chat'}</h4><p>${new Date(s.data).toLocaleDateString('pt-BR')}</p>
      <div style="margin-top:4px;">${s.status==='finalizada'?'<span class="tag tag-gray">🔒 Finalizada</span>':'<span class="tag tag-green">● Agendada</span>'}</div></div>
      ${s.status==='finalizada'?`<button class="btn btn-purple btn-sm" onclick="verSe(${s.id})">Ver →</button>`:''}
    </div>`).join('');
}

function loadSims(){
  const si=PRISMA.getSimulacoes(emp);
  document.getElementById('sims-l').innerHTML=!si.length?empty():
    si.map(s=>{const c=s.score>=70?'var(--green)':s.score>=40?'#e67e22':'var(--red)';
    return `<div class="list-item">
      <div class="card-icon icon-blue" style="width:40px;height:40px;font-size:1rem;flex-shrink:0;">🎭</div>
      <div style="flex:1;"><h4>${s.cenario}</h4><p>${s.setor} · ${s.cargo} · ${new Date(s.data).toLocaleDateString('pt-BR')}</p>
      <div style="margin-top:4px;"><span class="tag tag-blue">Score: <strong style="color:${c};">${s.score}/100</strong></span></div></div>
      <button class="btn btn-purple btn-sm" onclick="verSim(${s.id})">Ver →</button>
    </div>`;}).join('');
}

function loadRels(){
  const rl=PRISMA.getRelatorios(emp);
  document.getElementById('rels-l').innerHTML=!rl.length?empty():
    rl.map(r=>`<div class="list-item">
      <div class="card-icon icon-purple" style="width:40px;height:40px;font-size:1rem;flex-shrink:0;">📋</div>
      <div style="flex:1;"><h4>${r.titulo}</h4><p>${new Date(r.dataCriacao).toLocaleDateString('pt-BR')} · Risco: ${r.nivelRisco}/3</p></div>
      <button class="btn btn-purple btn-sm" onclick="verRel(${r.id})">Ver →</button>
    </div>`).join('');
}

function empty(){ return '<div class="empty"><p style="font-size:1.5rem;margin-bottom:8px;">📭</p><p>Nenhum dado registrado ainda.</p></div>'; }

function verOc(id){
  const o=PRISMA.getOcorrencias().find(x=>x.id===id); if(!o) return;
  openM(`<h2 style="margin-bottom:20px;">Análise da Ocorrência</h2>
    <div class="detail-row"><div class="detail-lbl">Empresa</div><div class="detail-val">${o.empresa}</div></div>
    <div class="detail-row"><div class="detail-lbl">Tipo</div><div class="detail-val">${o.tipo}</div></div>
    <div class="detail-row"><div class="detail-lbl">Identificação</div><div class="detail-val">${o.anonimo?'Anônimo':o.nome}</div></div>
    <div class="detail-row"><div class="detail-lbl">Frequência</div><div class="detail-val">${o.frequencia||'—'}</div></div>
    <div class="detail-row"><div class="detail-lbl">Setor</div><div class="detail-val">${o.setor||'—'}</div></div>
    <div class="detail-row"><div class="detail-lbl">Data</div><div class="detail-val">${new Date(o.data).toLocaleDateString('pt-BR')}</div></div>
    <div class="detail-row"><div class="detail-lbl">Descrição</div><div class="detail-text">${o.descricao}</div></div>`);
}

function verSe(id){
  const s=PRISMA.getSessoes().find(x=>x.id===id); if(!s||!s.formulario) return;
  const f=s.formulario;
  openM(`<h2 style="margin-bottom:4px;">Formulário Pós-Sessão</h2><p style="color:var(--muted);font-size:0.78rem;margin-bottom:20px;">🔒 Sessão finalizada</p>
    <div class="detail-row"><div class="detail-lbl">Profissional</div><div class="detail-val">${f.profissional}</div></div>
    <div class="detail-row"><div class="detail-lbl">Empresa</div><div class="detail-val">${s.empresa}</div></div>
    <div class="detail-row"><div class="detail-lbl">Data / Horário</div><div class="detail-val">${new Date(s.data).toLocaleDateString('pt-BR')} ${s.horario||''}</div></div>
    <div class="detail-row"><div class="detail-lbl">Formato</div><div class="detail-val">${s.formato==='video'?'Videochamada':'Chat'}</div></div>
    <div class="detail-row"><div class="detail-lbl">Nível de sofrimento</div><div class="detail-val"><strong>${f.nivelSofrimento}/5</strong></div></div>
    <div class="detail-row"><div class="detail-lbl">Resumo</div><div class="detail-text">${f.resumo}</div></div>
    <div class="detail-row"><div class="detail-lbl">Temas</div><div class="detail-text">${f.temas||'—'}</div></div>
    <div class="detail-row"><div class="detail-lbl">Riscos</div><div class="detail-text">${f.riscos||'—'}</div></div>
    <div class="detail-row"><div class="detail-lbl">Recomendações</div><div class="detail-text">${f.recomendacoes||'—'}</div></div>`);
}

function verSim(id){
  const s=PRISMA.getSimulacoes().find(x=>x.id===id); if(!s) return;
  const c=s.score>=70?'var(--green)':s.score>=40?'#e67e22':'var(--red)';
  openM(`<h2 style="margin-bottom:4px;">Relatório Técnico</h2><p style="color:var(--muted);font-size:0.78rem;margin-bottom:20px;">${s.empresa} · ${new Date(s.data).toLocaleDateString('pt-BR')}</p>
    <div class="detail-row"><div class="detail-lbl">Cenário</div><div class="detail-val">${s.cenario}</div></div>
    <div class="detail-row"><div class="detail-lbl">Setor</div><div class="detail-val">${s.setor}</div></div>
    <div class="detail-row"><div class="detail-lbl">Cargo</div><div class="detail-val">${s.cargo}</div></div>
    <div class="detail-row"><div class="detail-lbl">Score</div><div class="detail-val"><strong style="color:${c};font-size:1.3rem;">${s.score}/100</strong></div></div>
    <div class="detail-row"><div class="detail-lbl">Erros</div><div>${!s.erros?.length?'<p style="font-size:0.83rem;color:var(--green);margin-top:6px;">Nenhum erro.</p>':s.erros.map(e=>`<div style="background:var(--light);border-radius:8px;padding:10px 12px;margin-top:8px;border-left:3px solid var(--purple);"><span class="tag tag-purple" style="margin-bottom:6px;display:inline-block;">${e.tipo}</span><p style="font-size:0.78rem;font-style:italic;color:var(--muted);">"${e.trecho}"</p></div>`).join('')}</div></div>
    <div class="detail-row"><div class="detail-lbl">Recomendações</div><div>${s.recomendacoes?.map(r=>`<div style="background:var(--purple-bg);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:0.83rem;">${r}</div>`).join('')||'—'}</div></div>`);
}

function gerarRel(){
  const mes=new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const oc=PRISMA.getOcorrencias(emp), se=PRISMA.getSessoes(emp).filter(s=>s.status==='finalizada'), si=PRISMA.getSimulacoes(emp);
  const cont={};
  oc.forEach(o=>{if(o.tipo)cont[o.tipo]=(cont[o.tipo]||0)+1;});
  si.forEach(s=>s.erros?.forEach(e=>{cont[e.tipo]=(cont[e.tipo]||0)+1;}));
  const total=Object.values(cont).reduce((a,b)=>a+b,0);
  const nivel=total===0?1:total<=3?1:total<=8?2:3;
  const avg=Math.round(si.reduce((a,s)=>a+s.score,0)/(si.length||1));
  const setores={};
  si.forEach(s=>{setores[s.setor]=(setores[s.setor]||0)+1;});
  oc.forEach(o=>{if(o.setor)setores[o.setor]=(setores[o.setor]||0)+1;});
  const setorR=Object.entries(setores).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';
  const recs=new Set();
  se.forEach(s=>{if(s.formulario?.recomendacoes)recs.add(s.formulario.recomendacoes);});
  si.forEach(s=>s.recomendacoes?.forEach(r=>recs.add(r)));
  const titulo=`Relatório de Criticidade — ${mes} — ${emp}`;
  PRISMA.addRelatorio({empresa:emp,titulo,mes,nivelRisco:nivel,totalOcorrencias:oc.length,totalSessoes:se.length,totalSimulacoes:si.length,scoreMedia:avg,problemas:Object.entries(cont).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([t])=>t),setorRisco:setorR,recomendacoes:[...recs]});
  alert(`✓ "${titulo}" gerado!`); loadRels();
}

function verRel(id){
  const r=PRISMA.getRelatorios().find(x=>x.id===id); if(!r) return;
  const cores=['','var(--green)','#e67e22','var(--red)'];
  openM(`<h2 style="margin-bottom:4px;">📋 ${r.titulo}</h2><p style="color:var(--muted);font-size:0.78rem;margin-bottom:20px;">Gerado em ${new Date(r.dataCriacao).toLocaleDateString('pt-BR')}</p>
    <div style="background:${cores[r.nivelRisco]}18;border-radius:12px;padding:16px;text-align:center;margin-bottom:20px;">
      <p style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;">Nível de Risco Geral</p>
      <p style="font-size:2rem;font-weight:800;color:${cores[r.nivelRisco]};">${r.nivelRisco}/3</p>
    </div>
    <div class="detail-row"><div class="detail-lbl">Ocorrências</div><div class="detail-val">${r.totalOcorrencias}</div></div>
    <div class="detail-row"><div class="detail-lbl">Sessões finalizadas</div><div class="detail-val">${r.totalSessoes}</div></div>
    <div class="detail-row"><div class="detail-lbl">Simulações</div><div class="detail-val">${r.totalSimulacoes}</div></div>
    <div class="detail-row"><div class="detail-lbl">Score médio</div><div class="detail-val">${r.scoreMedia}/100</div></div>
    <div class="detail-row"><div class="detail-lbl">Setor de risco</div><div class="detail-val">${r.setorRisco}</div></div>
    <div class="detail-row"><div class="detail-lbl">Problemas frequentes</div><div style="margin-top:6px;">${r.problemas?.map(p=>`<span class="tag tag-purple" style="margin:2px;display:inline-block;">${p}</span>`).join('')||'Nenhum'}</div></div>
    <div class="detail-row"><div class="detail-lbl">Recomendações</div><div>${r.recomendacoes?.map(rec=>`<div style="background:var(--light);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:0.83rem;">${rec}</div>`).join('')||'<p style="font-size:0.83rem;color:var(--muted);margin-top:6px;">Nenhuma.</p>'}</div></div>`);
}

function openM(html){ document.getElementById('modal-body').innerHTML=html; document.getElementById('overlay').classList.add('open'); }
function closeM(){ document.getElementById('overlay').classList.remove('open'); }

carregarEmps();
</script>

<script>
function sairApp() {
  try { if(typeof PRISMA !== 'undefined') PRISMA.clearSession(); } catch(e) {}
  window.location.href = './index.html';
}
</script>
</body></html>
