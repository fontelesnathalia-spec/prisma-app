<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lugar Seguro — PRISMA</title>
<script src="shared.js"></script>
<link rel="stylesheet" href="style.css">
<style>
body { display:flex; flex-direction:column; min-height:100vh; }
.wrap { flex:1; display:flex; flex-direction:column; justify-content:center; padding:0 24px 40px; max-width:400px; margin:0 auto; width:100%; }
.back { display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:0.85rem; font-weight:600; text-decoration:none; padding:20px 0 32px; }
.login-icon { width:64px; height:64px; border-radius:18px; background:var(--green-bg); display:flex; align-items:center; justify-content:center; font-size:1.8rem; margin-bottom:20px; }
.err { background:var(--red-bg); color:var(--red); border-radius:10px; padding:12px 16px; font-size:0.85rem; font-weight:600; margin-bottom:16px; display:none; }
.note { text-align:center; font-size:0.78rem; color:var(--muted); margin-top:20px; display:flex; align-items:center; justify-content:center; gap:6px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back">← Voltar</a>
  <div class="login-icon">🛡️</div>
  <h1 style="margin-bottom:8px;">Lugar Seguro</h1>
  <p style="margin-bottom:32px;">Use as credenciais da sua empresa para acessar o espaço de acolhimento.</p>
  <div class="err" id="err">Credenciais incorretas.</div>
  <div class="form-group">
    <label class="label">Usuário da empresa</label>
    <input class="input" id="u" type="text" placeholder="Ex: empresaalpha" autocomplete="off"/>
  </div>
  <div class="form-group" style="margin-bottom:24px;">
    <label class="label">Senha</label>
    <input class="input" id="p" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
  </div>
  <button class="btn btn-green" onclick="login()">Entrar no Lugar Seguro</button>
  <div class="note">🔒 Suas informações são protegidas e podem ser anônimas</div>
</div>
<script>
function login(){
  const u=document.getElementById('u').value.trim().toLowerCase();
  const p=document.getElementById('p').value;
  const a=PRISMA.empresaAccess[u];
  if(a&&a.password===p){PRISMA.setSession({role:'colaborador',empresa:a.empresa,usuario:u});location.href='lugar-seguro.html';}
  else document.getElementById('err').style.display='block';
}
</script>
</body></html>
